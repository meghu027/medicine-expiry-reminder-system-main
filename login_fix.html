<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNova | Quick Login Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --primary-dark: #4338CA;
            --secondary: #10B981;
            --accent: #F59E0B;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #F8FAFC;
            --text-light: #CBD5E1;
            --text-dim: #94A3B8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-primary: linear-gradient(135deg, #4F46E5, #6366F1);
            --gradient-secondary: linear-gradient(135deg, #10B981, #34D399);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text); overflow: hidden; }
        .fix-container { width: 400px; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); padding: 40px; text-align: center; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 30px; }
        h2 { color: var(--text); margin-bottom: 20px; font-size: 24px; }
        .btn { 
            background: var(--gradient-primary); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 10px 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4); }
        .user-info { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
            text-align: left;
            border-left: 4px solid var(--success);
        }
        .user-info div { margin: 5px 0; font-size: 14px; }
        .status { 
            padding: 10px; 
            border-radius: 8px; 
            margin: 15px 0;
            font-weight: 600;
        }
        .success { background: var(--success); color: white; }
        .warning { background: var(--warning); color: var(--bg); }
    </style>
</head>
<body>
    <div class="fix-container">
        <div class="logo"><i class="fas fa-notes-medical"></i> MedNova</div>
        <h2>🔧 Quick Login Fix</h2>
        
        <div class="user-info">
            <div><strong>Default Admin User:</strong></div>
            <div>Email: admin@mednova.com</div>
            <div>Password: admin123</div>
        </div>
        
        <div class="status success">
            ✅ Test user ready to add
        </div>
        
        <button class="btn" onclick="addTestUser()">
            <i class="fas fa-user-plus"></i> Add Test User
        </button>
        
        <button class="btn" onclick="clearAllData()">
            <i class="fas fa-trash"></i> Clear All Data
        </button>
        
        <button class="btn" onclick="goToLogin()">
            <i class="fas fa-sign-in-alt"></i> Go to Login
        </button>
        
        <div class="status warning">
            ⚠️ After adding user, refresh login page and use: admin@mednova.com / admin123
        </div>
    </div>

    <script>
        function addTestUser() {
            const testUser = {
                email: 'admin@mednova.com',
                password: 'admin123',
                name: 'Administrator'
            };
            
            localStorage.setItem('mednova_user', JSON.stringify(testUser));
            
            // Update status
            document.querySelector('.status').innerHTML = '✅ Test user added successfully!';
            document.querySelector('.status').className = 'status success';
        }
        
        function clearAllData() {
            localStorage.clear();
            sessionStorage.clear();
            
            // Update status
            document.querySelector('.status').innerHTML = '🗑️ All data cleared!';
            document.querySelector('.status').className = 'status warning';
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        // Auto-check current user
        window.onload = function() {
            const currentUser = localStorage.getItem('mednova_user');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                document.querySelector('.user-info').innerHTML = `
                    <div><strong>Current User:</strong></div>
                    <div>Email: ${user.email}</div>
                    <div>Name: ${user.name}</div>
                `;
            }
        };
    </script>
</body>
</html>
