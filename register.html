<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNova | Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --primary-dark: #4338CA;
            --secondary: #10B981;
            --accent: #F59E0B;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #F8FAFC;
            --text-light: #CBD5E1;
            --text-dim: #94A3B8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-primary: linear-gradient(135deg, #4F46E5, #6366F1);
            --gradient-secondary: linear-gradient(135deg, #10B981, #34D399);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at bottom left, #1e293b, #0f172a); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); overflow: hidden; }
        
        /* Govt Style Header */
        .gov-header { width: 100%; background: #ffffff; border-bottom: 3px solid #ff9933; padding: 8px 30px; position: fixed; top: 0; z-index: 1000; }
        .gov-flex { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .gov-brand { display: flex; align-items: center; gap: 10px; color: #000080; }
        .gov-brand img { height: 30px; }
        .gov-title { font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .digilocker-badge { background: #0056b3; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 5px; }

        .register-container { width: 1000px; height: 600px; display: flex; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden; margin-top: 40px; }
        .visual-section { flex: 1; background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(16, 185, 129, 0.2)); display: flex; flex-direction: column; justify-content: center; padding: 60px; }
        .hero-text h1 { font-size: 42px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .hero-text span { color: var(--primary); }
        .form-section { flex: 1; padding: 30px 60px; display: flex; flex-direction: column; justify-content: center; background: rgba(15, 23, 42, 0.5); overflow-y: auto; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; }
        input { width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 10px 10px 45px; border-radius: 12px; color: white; transition: 0.3s; font-size: 14px; }
        input:focus { border-color: var(--primary); outline: none; background: rgba(15, 23, 42, 1); }
        .reg-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 15px; }
        .reg-btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .login-link { display: block; text-align: center; color: var(--primary); text-decoration: none; font-weight: 700; font-size: 13px; margin-top: 15px; }
        .error-msg { color: var(--danger); font-size: 12px; margin-bottom: 10px; display: none; text-align: center; }
        .form-section::-webkit-scrollbar { width: 5px; }
        .form-section::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="gov-header">
    <div class="gov-flex">
        <div class="gov-brand">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/cf/Aadhaar_Logo.svg/1200px-Aadhaar_Logo.svg.png" alt="Aadhaar">
            <span class="gov-title">Verified E-Healthcare Portal</span>
        </div>
        <div class="digilocker-badge"><i class="fas fa-certificate"></i> DigiLocker Integrated</div>
    </div>
</div>

<div class="register-container">
    <div class="visual-section">
        <div class="hero-text">
            <h1>Join the <br><span>Digital</span> Health Era</h1>
            <p style="color:var(--text-dim); margin-top:15px; font-size: 15px;">Setup your professional pharmacy network integrated with Aadhaar verification.</p>
            <div style="margin-top: 40px; padding: 15px; border-left: 3px solid var(--primary); background: rgba(16, 185, 129, 0.05);">
                <p style="font-size: 12px; color: var(--text-dim);">Design Lead:</p>
                <p style="font-weight: 700; color: var(--text);">Meghana Chaudhari</p>
            </div>
        </div>
    </div>
    
    <div class="form-section">
        <div class="logo"><i class="fas fa-notes-medical"></i> MedNova</div>
        <h2>Create Account</h2>
        <p class="subtitle">Aadhaar Linked Pharmacy Registration</p>
        
        <div id="regError" class="error-msg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPass" placeholder="Create a strong password" required>
                </div>
            </div>
            
            <button type="submit" class="reg-btn">CREATE ACCOUNT <i class="fas fa-check-circle" style="margin-left: 8px;"></i></button>
        </form>

        <a href="login.html" class="login-link">ALREADY HAVE AN ACCOUNT? LOG IN</a>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log("MedNova SW Registered"))
            .catch(err => console.log("SW Registration Failed"));
        });
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPass').value;
        const error = document.getElementById('regError');

        if (password.length < 5) {
            error.innerText = "❌ Password must be at least 5 characters!";
            error.style.display = "block";
            return;
        }

        if ("Notification" in window) {
            Notification.requestPermission();
        }

        // Saving simplified user data
        const userData = {
            name: name,
            email: email,
            password: password
        };

        localStorage.setItem('mednova_user', JSON.stringify(userData));
        
        alert("Registration Successful! Welcome to MedNova!");
        window.location.href = "login.html";
    });

    document.body.addEventListener('click', function() {
        const silentAudio = new Audio();
        silentAudio.play().catch(() => {});
    }, { once: true });
</script>

</body>
</html>
