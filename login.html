<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNova | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --primary-dark: #4338CA;
            --secondary: #10B981;
            --accent: #F59E0B;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #F8FAFC;
            --text-light: #CBD5E1;
            --text-dim: #94A3B8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-primary: linear-gradient(135deg, #4F46E5, #6366F1);
            --gradient-secondary: linear-gradient(135deg, #10B981, #34D399);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text); overflow: hidden; }
        .login-container { width: 1000px; height: 600px; display: flex; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden; }
        .visual-section { flex: 1; background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(99, 102, 241, 0.2)); display: flex; flex-direction: column; justify-content: center; padding: 60px; position: relative; }
        .hero-text h1 { font-size: 42px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .hero-text span { color: var(--primary); }
        .form-section { flex: 1; padding: 50px 60px; display: flex; flex-direction: column; justify-content: center; background: rgba(15, 23, 42, 0.5); }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        input { width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 12px 12px 45px; border-radius: 12px; color: white; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        .login-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .login-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .register-link-btn { display: block; width: 100%; padding: 12px; border: 1px solid var(--primary); color: var(--primary); text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 13px; text-align: center; transition: 0.3s; margin-top: 15px; }
        .register-link-btn:hover { background: rgba(16, 185, 129, 0.1); }
        .error-msg { color: var(--danger); font-size: 13px; margin-bottom: 15px; display: none; text-align: center; }
        @media (max-width: 900px) { .visual-section { display: none; } .login-container { width: 95%; height: auto; } }
    </style>
</head>
<body>
<div class="login-container">
    <div class="visual-section">
        <div class="hero-text"><h1>MedNova <br><span>Healthcare</span> System</h1><p style="color:var(--text-dim); margin-top:15px;">Secure management for your pharmacy records.</p></div>
    </div>
    <div class="form-section">
        <div class="logo"><i class="fas fa-notes-medical"></i> MedNova</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your details to access dashboard.</p>
        <div id="errorMsg" class="error-msg">Invalid credentials!</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="admin@mednova.com" required></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="••••••••" required></div>
            </div>
            <button type="submit" class="login-btn">LOG IN <i class="fas fa-sign-in-alt" style="margin-left: 8px;"></i></button>
        </form>
        <div style="text-align: center; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
            <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 10px;">New user? Setup your account below:</p>
            <a href="register.html" class="register-link-btn"><i class="fas fa-user-plus"></i> CREATE NEW ACCOUNT</a>
        </div>
    </div>
</div>
<script>
    function openForgotModal() {
        document.getElementById('forgotModal').style.display = 'flex';
        document.getElementById('recoveryMsg').innerText = "";
    }

    function closeForgotModal() {
        document.getElementById('forgotModal').style.display = 'none';
    }

    function verifyIdentity() {
        const rollInput = document.getElementById('verifyRoll').value;
        const msg = document.getElementById('recoveryMsg');

        // Security Check for Meghana (Roll 159)
        if (rollInput === "159") {
            msg.style.color = "#10b981";
            msg.innerHTML = "✅ Identity Verified!<br>Your Password: <b style='color:white;'>12345</b>";
        } else {
            msg.style.color = "#f43f5e";
            msg.innerText = "❌ Incorrect Roll Number!";
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const emailInput = document.getElementById('email').value;
        const passInput = document.getElementById('password').value;
        const error = document.getElementById('errorMsg');

        // Get Saved User from LocalStorage
        const savedUser = JSON.parse(localStorage.getItem('mednova_user'));

        if (savedUser) {
            // Check if credentials match
            if (emailInput === savedUser.email && passInput === savedUser.password) {
                
                // --- NEW LINE ADDED TO SAVE NAME ---
                localStorage.setItem('currentUser', savedUser.name || "User");
                
                // Success!
                alert("Welcome back to MedNova!");
                window.location.href = "dashboard.html";
            } else {
                error.innerText = "❌ Incorrect Email or Password!";
                error.style.display = "block";
            }
        } else {
            // No user found in system
            error.innerText = "❌ No account found. Please Register first!";
            error.style.display = "block";
        }

        setTimeout(() => { error.style.display = "none"; }, 3000);
    });

</script>
</body>
</html>
